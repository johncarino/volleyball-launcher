<!DOCTYPE html>
<!-- MARKER: GESTURE_UI -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BeagleY-AI Gesture Control</title>
  <link rel="stylesheet" href="stylesheets/style.css" />
  <style>
    :root {
      --bg: #0f1220;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-border: rgba(255, 255, 255, 0.12);
      --accent: #6ee7b7;
      --accent-2: #60a5fa;
      --text: #e5e7eb;
      --muted: #9aa3b2;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(96, 165, 250, 0.15), transparent),
        radial-gradient(900px 500px at -10% 110%, rgba(110, 231, 183, 0.12), transparent),
        var(--bg);
    }

    .wrap { max-width: 880px; margin: 0 auto; padding: 28px 18px 60px; }

    header h1 { margin: 0 0 4px; font-size: 1.6rem; }
    header p { margin: 0 0 22px; color: var(--muted); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(8px);
      margin-bottom: 18px;
    }

    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    button {
      cursor: pointer;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 1rem;
      transition: transform 0.05s ease, background 0.2s ease, opacity 0.2s ease;
    }
    button:hover { background: rgba(255, 255, 255, 0.14); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #startBtn { border-color: rgba(110, 231, 183, 0.5); }
    #stopBtn { border-color: rgba(248, 113, 113, 0.5); }

    .pill {
      margin-left: auto;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      border: 1px solid var(--panel-border);
      color: var(--muted);
    }
    .pill.on { color: #052e16; background: var(--accent); border-color: var(--accent); }

    .gesture-name {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      margin: 4px 0 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .finger-count { text-align: center; color: var(--muted); margin-bottom: 18px; }
    .finger-count span { color: var(--text); font-weight: 700; }

    .fingers {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .finger {
      text-align: center;
      padding: 14px 6px;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .finger .finger-name { font-size: 0.8rem; color: var(--muted); }
    .finger .finger-state { font-size: 1.1rem; font-weight: 700; margin-top: 6px; }
    .finger.up {
      background: rgba(110, 231, 183, 0.14);
      border-color: rgba(110, 231, 183, 0.55);
    }
    .finger.up .finger-state { color: var(--accent); }
    .finger.down .finger-state { color: var(--muted); }

    #status {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      color: var(--muted);
      max-height: 160px;
      overflow-y: auto;
      margin: 0;
    }

    #error-box {
      border: 1px solid rgba(248, 113, 113, 0.5);
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 18px;
    }

    h2 { font-size: 1rem; color: var(--muted); margin: 0 0 12px; font-weight: 600; }

    input, select {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--panel-border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      width: 110px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; color: var(--muted); font-size: 0.8rem; }
    button.small { padding: 10px 16px; font-size: 0.9rem; }
    #launcherStopBtn { border-color: rgba(248, 113, 113, 0.5); }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }
    .preset {
      text-align: center;
      padding: 12px 8px;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
    }
    .preset .slot { font-size: 0.75rem; color: var(--muted); }
    .preset .info { font-weight: 700; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>BeagleY-AI Gesture Control</h1>
      <p>MediaPipe hand tracking &rarr; UDP &rarr; live web readout</p>
    </header>

    <div id="error-box">
      <strong>Error:</strong> <span id="error-text"></span>
    </div>

    <div class="panel">
      <div class="row">
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
        <span class="pill" id="statePill">Idle</span>
        <span style="display:none" id="stateid">Idle</span>
      </div>
    </div>

    <div class="panel">
      <div class="gesture-name" id="gestureName">NONE</div>
      <div class="finger-count">Fingers up: <span id="fingerCount">0</span></div>
      <div class="fingers">
        <div class="finger down" id="finger-thumb">
          <div class="finger-name">Thumb</div><div class="finger-state">down</div>
        </div>
        <div class="finger down" id="finger-index">
          <div class="finger-name">Index</div><div class="finger-state">down</div>
        </div>
        <div class="finger down" id="finger-middle">
          <div class="finger-name">Middle</div><div class="finger-state">down</div>
        </div>
        <div class="finger down" id="finger-ring">
          <div class="finger-name">Ring</div><div class="finger-state">down</div>
        </div>
        <div class="finger down" id="finger-pinky">
          <div class="finger-name">Pinky</div><div class="finger-state">down</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Calibration</h2>
      <div class="row">
        <label class="field">Net height (m)
          <input type="number" id="calNet" step="0.01" min="2.0" max="3.0" value="2.43" />
        </label>
        <label class="field">Court width (m)
          <input type="number" id="calWidth" step="0.1" min="5.0" max="20.0" value="9.0" />
        </label>
        <label class="field">Court length (m)
          <input type="number" id="calLength" step="0.1" min="10.0" max="30.0" value="18.0" />
        </label>
        <button class="small" id="calApplyBtn">Apply calibration</button>
      </div>
    </div>

    <div class="panel">
      <h2>Machine position &amp; presets</h2>
      <div class="row">
        <label class="field">Machine position
          <select id="machinePos">
            <option value="0">Left</option>
            <option value="1" selected>Center</option>
            <option value="2">Right</option>
          </select>
        </label>
        <button class="small" id="machineApplyBtn">Set position (rebuild presets)</button>
      </div>
      <div class="row" style="margin-top:14px;">
        <label class="field">Target (1-5)
          <input type="number" id="setTarget" min="1" max="5" value="3" />
        </label>
        <label class="field">Tempo (1-4)
          <input type="number" id="setTempo" min="1" max="4" value="2" />
        </label>
        <label class="field">Slot (0-3)
          <input type="number" id="setSlot" min="0" max="3" value="0" />
        </label>
        <button class="small" id="saveSetBtn">Save preset</button>
      </div>
      <div class="presets" id="presets">
        <div class="preset" id="preset-0"><div class="slot">Slot 0</div><div class="info">&mdash;</div></div>
        <div class="preset" id="preset-1"><div class="slot">Slot 1</div><div class="info">&mdash;</div></div>
        <div class="preset" id="preset-2"><div class="slot">Slot 2</div><div class="info">&mdash;</div></div>
        <div class="preset" id="preset-3"><div class="slot">Slot 3</div><div class="info">&mdash;</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>Operation</h2>
      <div class="row">
        <label class="field">Preset slot
          <select id="runSlot">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </label>
        <button class="small" id="runBtn">Run preset</button>
        <button class="small" id="launcherStopBtn">Stop motors</button>
      </div>
    </div>

    <div class="panel">
      <h2>Developer (manual control)</h2>
      <div class="row">
        <label class="field">Tilt (deg, 9-81)
          <input type="number" id="devTilt" step="1" min="9" max="81" value="9" />
        </label>
        <button class="small" id="devTiltBtn">Set tilt</button>
        <label class="field">Speed (rpm, 0-1200)
          <input type="number" id="devSpeed" step="10" min="0" max="1200" value="0" />
        </label>
        <button class="small" id="devSpeedBtn">Set speed</button>
      </div>
    </div>

    <div class="panel">
      <h2>Status log</h2>
      <pre id="status"></pre>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
  <script src="javascripts/gesture_ui.js"></script>
</body>
</html>
